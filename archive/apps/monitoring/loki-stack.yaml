apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    chart: loki-stack
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.10.2
    helm:
      releaseName: loki
      values: |
        loki:
          enabled: true
          isDefault: false
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 10Gi
          config:
            auth_enabled: false
        promtail:
          enabled: true
        grafana:
          enabled: false
        prometheus:
          enabled: false
        fluent-bit:
          enabled: false
        filebeat:
          enabled: false
        logstash:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
