apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: homelab-agent
  namespace: ai-stack
spec:
  # This tells the operator to spin up Ollama right next to your agent
  ollama:
    enabled: true
    models:
      - llama3
    resources:
      limits:
        cpu: "12" # Protected limit to keep the worker node stable
        memory: "16Gi"

  # Pulls in your OpenAI key for the main orchestrator and fallbacks
  envFrom:
    - secretRef:
        name: openclaw-api-keys

  # The actual agent routing logic
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "openai/gpt-4o"

        list:
          # 1. The Main Orchestrator
          - id: "main"
            name: "Homelab Orchestrator"
            model:
              primary: "openai/gpt-4o"

          # 2. The Proxmox Sub-Agent
          - id: "proxmox-admin"
            name: "Proxmox Admin"
            model:
              primary: "ollama/llama3"
              fallbacks:
                - "openai/gpt-4o"

          # 3. The Cluster Sub-Agent
          - id: "cluster-admin"
            name: "Cluster Admin"
            model:
              primary: "ollama/llama3"
              fallbacks:
                - "openai/gpt-4o"
