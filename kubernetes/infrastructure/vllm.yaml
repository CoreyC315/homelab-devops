apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/CoreyC315/homelab-devops.git"
    path: kubernetes/apps/vllm
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ai-stack
  # KEDA owns .spec.replicas on the vLLM Deployments (scale-to-zero).
  # Without this, ArgoCD selfHeal and KEDA fight over the replica count.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
