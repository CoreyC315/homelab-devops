apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-http-add-on
  namespace: argocd
spec:
  project: default
  source:
    chart: keda-add-ons-http
    repoURL: https://kedacore.github.io/charts
    targetRevision: 0.15.0
    helm:
      # Release name determines the interceptor/scaler service names that
      # the vLLM InterceptorRoutes + ScaledObjects reference:
      #   keda-add-ons-http-interceptor-proxy.keda:8080
      #   keda-add-ons-http-external-scaler.keda:9090
      releaseName: keda-add-ons-http
      values: |
        interceptor:
          replicas:
            min: 1 # default 3 is datacenter-sized; this is a homelab
            max: 2
        # Timeouts are set PER-ROUTE on the vLLM InterceptorRoutes
        # (readiness/responseHeader/request) — global defaults stay stock.
  destination:
    server: "https://kubernetes.default.svc"
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
