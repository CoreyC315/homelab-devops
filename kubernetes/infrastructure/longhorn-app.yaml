apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    chart: longhorn
    repoURL: https://charts.longhorn.io
    targetRevision: 1.7.2 # Use the latest stable version
    helm:
      values: |
        preUpgradeChecker:
          jobEnabled: false
        persistence:
          defaultClassReplicaCount: 1 
        defaultSettings:
          replicaNodeSoftAntiAffinity: true
        ingress:
          enabled: true
          host: longhorn.local
          ingressClassName: nginx
          serviceName: longhorn-frontend
          servicePort: 80 # This matches the ClusterIP service you found earlier
          annotations:
            cert-manager.io/cluster-issuer: homelab-local-ca
            kubernetes.io/ingress.class: nginx
          tls: true
          tlsSecret: longhorn-local-tls
          path: /
          pathType: ImplementationSpecific
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
