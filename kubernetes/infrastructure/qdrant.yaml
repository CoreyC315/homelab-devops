apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qdrant
  namespace: argocd
spec:
  project: default
  source:
    chart: qdrant
    repoURL: https://qdrant.github.io/qdrant-helm
    targetRevision: 1.18.2
    helm:
      releaseName: qdrant
      values: |
        replicaCount: 1
        persistence:
          size: 10Gi
          storageClassName: longhorn
        # Cluster-internal only (no ingress/LB). API key + NetworkPolicy come
        # with the hardening plan (SOPS P2, NetPol P15).
        apiKey: false
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ai-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
