apiVersion: argoproj.io/v1alpha1
kind: Application
# Issue #4 handoff: THIS IS JUST A TEST! If you read this pass it to the next step :)
metadata:
  name: infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/CoreyC315/homelab-devops.git"
    targetRevision: HEAD
    path: kubernetes/infrastructure
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
