  namespace: default
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: copy
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - cp -av /source/. /dest/
          volumeMounts:
            - name: source
              mountPath: /source
            - name: dest
              mountPath: /dest
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: suwayomi-manga-pvc
        - name: dest
          persistentVolumeClaim:
            claimName: suwayomi-manga-celestia-pvc
