apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      # Pinned to aether-worker: single-node consolidation 2026-06-13. nahida
      # is powered off, so keep seerr (and its Longhorn replica) on the only
      # live worker.
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      containers:
        - name: seerr
          image: fallenbagel/jellyseerr:2.7.3
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - containerPort: 5055
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config-pvc
