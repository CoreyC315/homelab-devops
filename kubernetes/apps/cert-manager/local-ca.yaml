apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-bootstrap-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-local-root
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab.local Root CA
  secretName: homelab-local-root-ca
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: local-bootstrap-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-local-ca
spec:
  ca:
    secretName: homelab-local-root-ca
