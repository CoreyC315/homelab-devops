apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-chat
  namespace: ai-stack
  labels:
    app: vllm-chat
    app.kubernetes.io/part-of: vllm
spec:
  # NOTE: .spec.replicas intentionally omitted — KEDA owns it (ScaledObject,
  # min 0 / max 1). The vllm Application carries ignoreDifferences for it.
  strategy:
    type: Recreate # single GPU — a rolling update would deadlock on nvidia.com/gpu
  selector:
    matchLabels:
      app: vllm-chat
  template:
    metadata:
      labels:
        app: vllm-chat
        app.kubernetes.io/part-of: vllm
        teyvat.io/gpu-workload: "true" # game-mode.sh deletes pods by this label
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: pneuma
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.24.0
          args:
            - --model=Qwen/Qwen3-14B-AWQ # awq_marlin auto-detected on sm_120
            - --served-model-name=qwen3-14b
            - --max-model-len=16384
            # 0.85, not 0.90: the VM's desktop session (SDDM/Hyprland + dummy
            # HDMI) permanently holds ~0.5GB VRAM. Drop to 0.80 if OOM.
            - --gpu-memory-utilization=0.85
            - --max-num-seqs=8
            # Qwen3 is a thinking model — split <think> into reasoning_content
            # so clients get clean content (verified live: inline otherwise).
            - --reasoning-parser=qwen3
          env:
            - name: NVIDIA_VISIBLE_DEVICES # pin to GPU 1 (ce60b941); GPU 0 belongs to the desktop/Sunshine session
              value: GPU-ce60b941-5e31-b802-0db4-192f32e1d297
            - name: HF_HOME
              value: /models/hf
            - name: VLLM_CACHE_ROOT # persist torch.compile cache across cold starts
              value: /models/vllm-cache
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "10"
              memory: 20Gi
              nvidia.com/gpu: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            # 30 min: model load over the (currently PCIe 3.0 x1) link + engine
            # init, with margin for a full ~10GB HF re-download if the cache
            # (pre-warmed hostPath, HF_HOME) is ever wiped.
            failureThreshold: 180
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        # Node-local NVMe cache. pneuma is taint-excluded from Longhorn and the
        # contents are re-downloadable — hostPath is deliberate (jellyfin
        # /dev/dri precedent).
        - name: models
          hostPath:
            path: /var/lib/vllm-models
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
