apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm
  namespace: ai-stack
  labels:
    app.kubernetes.io/part-of: vllm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vllm
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  # Note: targets vanish while a model is scaled to zero — expected.
