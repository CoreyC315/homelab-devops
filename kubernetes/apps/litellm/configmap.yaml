apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-stack
data:
  config.yaml: |
    model_list:
      - model_name: qwen3-14b
        litellm_params:
          model: hosted_vllm/qwen3-14b
          # Phase 4 flips this to the KEDA interceptor gateway
          # (http://vllm-chat-gw.ai-stack.svc.cluster.local:8080/v1).
          # NOTE: config-only changes need a litellm rollout — bump the
          # teyvat.io/config-rev annotation in deployment.yaml alongside.
          api_base: http://vllm-chat.ai-stack.svc.cluster.local:8000/v1
          api_key: none
          timeout: 900
      - model_name: qwen2.5-coder-14b
        litellm_params:
          model: hosted_vllm/qwen2.5-coder-14b
          api_base: http://vllm-coder.ai-stack.svc.cluster.local:8000/v1
          api_key: none
          timeout: 900
      # Embeddings via TEI (CPU, regular workers; deploys with the rag app —
      # requests 5xx harmlessly until then).
      - model_name: bge-small-en-v1.5
        litellm_params:
          model: openai/bge-small-en-v1.5
          api_base: http://tei.ai-stack.svc.cluster.local/v1
          api_key: none
      # Retrieval-augmented pipeline (rag-api wraps Qdrant + qwen3-14b).
      - model_name: teyvat-rag
        litellm_params:
          model: openai/teyvat-rag
          api_base: http://rag-api.ai-stack.svc.cluster.local:8000/v1
          api_key: none
          timeout: 900
    litellm_settings:
      num_retries: 2
      request_timeout: 900 # must survive scale-from-zero cold starts (PCIe x1)
      callbacks: ["prometheus"]
      # /metrics is cluster-internal; without this Prometheus scrapes 401
      # (v1.90.0 defaults require_auth_for_metrics_endpoint to True).
      require_auth_for_metrics_endpoint: false
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
