apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai-stack
  labels:
    app: litellm
  annotations:
    metallb.io/loadBalancerIPs: 192.168.1.55
spec:
  type: LoadBalancer
  # .55 is the last free pool IP (.51 is reserved as the Envoy staging IP by
  # the hardening plan).
  loadBalancerIP: 192.168.1.55
  selector:
    app: litellm
  ports:
    - name: http
      port: 80
      targetPort: http
