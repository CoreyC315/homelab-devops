apiVersion: batch/v1
kind: Job
metadata:
  name: suwayomi-manga-migration
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache rsync
              mkdir -p /target
              rsync -aH --delete --info=progress2 /source/ /target/
          volumeMounts:
            - name: source
              mountPath: /source
            - name: target
              mountPath: /target
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: suwayomi-manga-pvc
        - name: target
          persistentVolumeClaim:
            claimName: suwayomi-manga-media-pvc
