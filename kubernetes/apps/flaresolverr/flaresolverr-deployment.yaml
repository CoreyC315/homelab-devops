apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: default
spec:
  replicas: 0  # scaled to 0 2026-06-13 — single-node consolidation, only jellyfin+seerr kept
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
          env:
            - name: TZ
              value: America/Detroit
            - name: LOG_LEVEL
              value: info
          ports:
            - containerPort: 8191
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 15
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 30
