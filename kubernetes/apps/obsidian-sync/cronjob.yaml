apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-sync
  namespace: ai-stack
spec:
  suspend: true  # suspended 2026-06-13 — single-node consolidation, only jellyfin+seerr kept
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: "aether-worker"
          restartPolicy: OnFailure
          containers:
            - name: git-sync
              image: alpine/git:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  REPO_AUTH="https://${GITHUB_PAT}@${REPO_URL#https://}"
                  git config --global --add safe.directory "${DEST_PATH}"
                  cd "${DEST_PATH}"
                  # Init in-place rather than clone: the PVC isn't empty
                  # (Longhorn volumes contain lost+found), which makes
                  # `git clone <dir>` refuse to run.
                  if [ ! -d .git ]; then
                    echo "Initializing repo in ${DEST_PATH}..."
                    git init -q
                    git remote add origin "${REPO_AUTH}"
                  fi
                  git remote set-url origin "${REPO_AUTH}"
                  echo "Fetching..."
                  git fetch -q --depth=1 origin
                  git reset --hard origin/main
                  git clean -fd -e lost+found
                  echo "Sync complete ($(git rev-parse --short HEAD)): $(date)"
              envFrom:
                - configMapRef:
                    name: obsidian-sync-config
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: obsidian-sync-secret
                      key: GITHUB_PAT
              volumeMounts:
                - name: vault
                  mountPath: /vault
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "128Mi"
          volumes:
            - name: vault
              persistentVolumeClaim:
                claimName: obsidian-vault
