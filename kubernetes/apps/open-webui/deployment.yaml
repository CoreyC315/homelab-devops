apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai-stack
  labels:
    app: open-webui
spec:
  replicas: 0  # scaled to 0 2026-06-13 — single-node consolidation, only jellyfin+seerr kept
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: open-webui-config
          env:
            - name: DATA_DIR
              value: /app/backend/data
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
            - name: vault
              mountPath: /vault
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
