apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai-stack
  labels:
    app: open-webui
spec:
  replicas: 1 # restored 2026-07 — fronts the LiteLLM gateway (pneuma GPU platform)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:v0.10.2 # pinned (was :main)
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: open-webui-config
          env:
            - name: DATA_DIR
              value: /app/backend/data
            # LiteLLM master key doubles as the OpenAI-compatible API key.
            # TODO(SOPS): migrate litellm-secret in hardening-plan Phase 2.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
            - name: vault
              mountPath: /vault
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
