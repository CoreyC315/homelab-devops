apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
spec:
  replicas: 1  # restored 2026-06-15 — full cluster back online (un-consolidated)
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:6.3.0.10514-ls311
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data # Shared TrueNAS mount
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc
