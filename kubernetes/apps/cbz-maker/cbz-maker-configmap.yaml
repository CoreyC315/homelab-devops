apiVersion: v1
kind: ConfigMap
metadata:
  name: cbz-maker-script
  namespace: default
data:
  bulk_pdf.py: |
    import os
    import sys
    import zipfile
    import re
    import json
    import shutil
    import datetime
    from xml.etree.ElementTree import Element, SubElement, tostring
    from xml.dom import minidom

    # Each Komga library cbz-maker manages. `normalize` enables chapter-filename
    # normalization (manga only — lewd is single-book doujinshi, must not be renamed).
    LIBRARIES = [
        {"root": "/data/lewd",  "komga_id": "0Q7SHWMH1Y5D8", "normalize": False},
        {"root": "/data/manga", "komga_id": "0Q7SGBC95YF32", "normalize": True},
    ]

    # Preview normalization without renaming anything (set NORMALIZE_DRY_RUN=true).
    DRY_RUN = os.environ.get("NORMALIZE_DRY_RUN", "").lower() == "true"

    PAD = 4  # zero-pad width; 4 handles long runners (e.g. One Piece > 1000)
    CHAPTER_NUM_RE = re.compile(r'\d+(?:\.\d+)?')
    NOISE_RE = re.compile(r'[\(\[\{][^\)\]\}]*[\)\]\}]')  # (..) [..] {..} groups

    def natural_sort_key(s):
        return [int(text) if text.isdigit() else text.lower()
                for text in re.split('([0-9]+)', s)]

    def extract_zips(base_path):
        for item in os.listdir(base_path):
            if not item.lower().endswith('.zip'):
                continue

            zip_path = os.path.join(base_path, item)
            extract_to = os.path.join(base_path, item[:-4])

            if os.path.exists(extract_to):
                print(f"[-] Skipping extraction of {item}: folder already exists")
                continue

            print(f"[~] Extracting: {item}")
            try:
                with zipfile.ZipFile(zip_path, 'r') as z:
                    z.extractall(extract_to)
                os.remove(zip_path)
                print(f"[~] Done: {item} → {os.path.basename(extract_to)}/")
            except Exception as e:
                print(f"[!] Failed to extract {item}: {e}")

    def _get_title(meta):
        titles = meta.get("title", {})
        return (
            titles.get("english")
            or titles.get("pretty")
            or titles.get("japanese")
            or str(meta.get("id", "Unknown"))
        )

    def _extract_tags_by_type(tags):
        grouped = {}
        for tag in tags:
            tag_type = tag.get("type", "tag")
            name = tag.get("name", "").strip()
            if not name:
                continue
            grouped.setdefault(tag_type, []).append(name)
        return grouped

    def _get_language_code(languages):
        lang_map = {
            "english": "en", "translated": "en", "japanese": "ja",
            "chinese": "zh", "korean": "ko", "spanish": "es",
            "french": "fr", "german": "de", "italian": "it",
            "russian": "ru", "portuguese": "pt",
        }
        for lang in languages:
            code = lang_map.get(lang.lower())
            if code:
                return code
        return ""

    def build_comicinfo_xml(meta):
        tags_by_type = _extract_tags_by_type(meta.get("tags", []))
        title      = _get_title(meta)
        tags       = tags_by_type.get("tag", [])
        categories = tags_by_type.get("category", [])
        languages  = tags_by_type.get("language", [])
        artists    = tags_by_type.get("artist", [])
        groups     = tags_by_type.get("group", [])
        parodies   = tags_by_type.get("parody", [])
        characters = tags_by_type.get("character", [])

        authors   = artists if artists else groups
        # nhentai uses parody:"original" for non-fanwork — exclude it from Series
        real_parodies = [p for p in parodies if p.lower() != "original"]
        all_tags  = tags + categories + characters
        lang_code = _get_language_code(languages)

        year = ""
        upload_date = meta.get("upload_date")
        if upload_date:
            try:
                year = str(datetime.datetime.fromtimestamp(upload_date).year)
            except Exception:
                pass

        root = Element("ComicInfo")
        root.set("xmlns:xsi", "http://www.w3.org/2001/XMLSchema-instance")
        root.set("xsi:noNamespaceSchemaLocation",
                 "https://raw.githubusercontent.com/anansi-project/comicinfo/main/schema/v2.1/ComicInfo.xsd")

        def add(tag, value):
            if value:
                el = SubElement(root, tag)
                el.text = str(value)

        add("Title",         title)
        add("Series",        ", ".join(real_parodies))
        add("Year",          year)
        add("Writer",        ", ".join(authors))
        add("Genre",         ", ".join(real_parodies))
        add("Tags",          ", ".join(all_tags))
        add("LanguageISO",   lang_code)
        add("PageCount",     str(meta["num_pages"]) if meta.get("num_pages") else "")
        add("ScanInformation", meta.get("scanlator", ""))
        add("Web",           f"https://nhentai.net/g/{meta['id']}/" if "id" in meta else "")

        raw = tostring(root, encoding="unicode")
        return minidom.parseString(raw).toprettyxml(indent="  ", encoding=None)

    def load_meta_xml(subdir):
        """Return ComicInfo.xml string from meta.json in subdir, or None."""
        meta_path = os.path.join(subdir, "meta.json")
        if not os.path.exists(meta_path):
            return None
        try:
            with open(meta_path, "r", encoding="utf-8") as f:
                meta = json.load(f)
            return build_comicinfo_xml(meta)
        except Exception as e:
            print(f"[!] Failed to parse meta.json in {os.path.basename(subdir)}: {e}")
            return None

    def inject_comicinfo(cbz_path, xml_content):
        """Replace or add ComicInfo.xml in an existing CBZ in-place."""
        tmp_path = cbz_path + ".tmp"
        try:
            with zipfile.ZipFile(cbz_path, "r") as zin:
                with zipfile.ZipFile(tmp_path, "w", zipfile.ZIP_STORED) as zout:
                    for item in zin.infolist():
                        if item.filename.lower() == "comicinfo.xml":
                            continue
                        zout.writestr(item, zin.read(item.filename))
                    zout.writestr("ComicInfo.xml", xml_content)
            shutil.move(tmp_path, cbz_path)
            return True
        except Exception as e:
            print(f"[!] Failed to inject ComicInfo.xml into {os.path.basename(cbz_path)}: {e}")
            if os.path.exists(tmp_path):
                os.remove(tmp_path)
            return False

    def create_cbz_with_skip(base_path):
        expanded_path = os.path.abspath(os.path.expanduser(base_path))

        if not os.path.exists(expanded_path):
            print(f"Error: Path not found: {expanded_path}")
            return

        print(f"Scanning: {expanded_path}...")

        for subdir, dirs, files in os.walk(expanded_path):
            existing_cbzs = [f for f in files if f.lower().endswith('.cbz')]

            if existing_cbzs:
                cbz_path = os.path.join(subdir, existing_cbzs[0])
                try:
                    with zipfile.ZipFile(cbz_path, "r") as z:
                        has_comicinfo = any(n.lower() == "comicinfo.xml" for n in z.namelist())
                except Exception:
                    has_comicinfo = True  # unreadable archive, leave it alone
                if not has_comicinfo:
                    xml = load_meta_xml(subdir)
                    if xml:
                        print(f"[~] Injecting ComicInfo.xml into existing: {existing_cbzs[0]}")
                        inject_comicinfo(cbz_path, xml)
                    else:
                        print(f"[-] Skipping {os.path.basename(subdir)}: .cbz exists, no meta.json")
                else:
                    print(f"[-] Skipping {os.path.basename(subdir)}: .cbz already complete")
                continue

            image_files = [
                f for f in files
                if f.lower().endswith(('.jpg', '.jpeg', '.webp', '.png'))
            ]

            if not image_files:
                continue

            image_files.sort(key=natural_sort_key)
            folder_name = os.path.basename(subdir)
            output_cbz = os.path.join(subdir, f"{folder_name}.cbz")
            xml = load_meta_xml(subdir)
            meta_note = " + ComicInfo.xml" if xml else ""

            print(f"[+] Creating: {folder_name}.cbz ({len(image_files)} images{meta_note})")

            try:
                with zipfile.ZipFile(output_cbz, 'w', zipfile.ZIP_STORED) as cbz:
                    for img in image_files:
                        img_path = os.path.join(subdir, img)
                        cbz.write(img_path, arcname=img)
                    if xml:
                        cbz.writestr("ComicInfo.xml", xml)
            except Exception as e:
                print(f"[!] Failed to process {subdir}: {e}")

    def _pad_chapter(num):
        """'85' -> '0085', '12.5' -> '0012.5' (PAD-width integer part)."""
        if '.' in num:
            intpart, dec = num.split('.', 1)
            return f"{int(intpart):0{PAD}d}.{dec}"
        return f"{int(num):0{PAD}d}"

    def normalize_chapter_filenames(root):
        """Rename CBZ chapters to '<series> NNNN.cbz' so Komga parses numbers
        reliably (consistent prefix + zero-padding => lexical order == numeric).
        Conservative: only multi-chapter folders, only files with exactly one
        chapter number after stripping (year)/[group] noise, never overwrites."""
        if not os.path.isdir(root):
            print(f"[-] normalize: {root} not found, skipping")
            return
        print(f"Normalizing chapter filenames under: {root}{'  (DRY RUN — no changes)' if DRY_RUN else ''}")
        renamed = skipped = 0
        for subdir, dirs, files in os.walk(root):
            cbz_files = sorted((f for f in files if f.lower().endswith('.cbz')), key=natural_sort_key)
            if len(cbz_files) < 2:
                continue  # single-book / one-shot folder — leave alone
            series = os.path.basename(subdir)
            if any(c.isdigit() for c in series):
                print(f"[-] normalize: series name has digits, skipping folder: {series!r}")
                continue
            for f in cbz_files:
                cleaned = NOISE_RE.sub('', f[:-4])
                nums = CHAPTER_NUM_RE.findall(cleaned)
                if len(nums) != 1:
                    skipped += 1
                    continue  # zero or ambiguous numbers — don't guess
                target = f"{series} {_pad_chapter(nums[0])}.cbz"
                if target == f:
                    continue  # already normalized
                dst = os.path.join(subdir, target)
                if os.path.exists(dst):
                    print(f"[-] normalize: target exists, skip: {f!r} -> {target!r}")
                    skipped += 1
                    continue
                print(f"[~] normalize: {f!r} -> {target!r}")
                if not DRY_RUN:
                    os.rename(os.path.join(subdir, f), dst)
                renamed += 1
        print(f"[=] normalize {root}: {renamed} renamed, {skipped} left as-is")

    def trigger_komga_scan(komga_id):
        import urllib.request
        import urllib.error
        import base64

        user = os.environ.get('KOMGA_USER')
        password = os.environ.get('KOMGA_PASSWORD')
        if not user or not password:
            print("[-] KOMGA_USER/KOMGA_PASSWORD not set, skipping library scan")
            return

        url = f'http://komga.default.svc.cluster.local/api/v1/libraries/{komga_id}/scan'
        token = base64.b64encode(f'{user}:{password}'.encode()).decode()
        req = urllib.request.Request(url, method='POST')
        req.add_header('Authorization', f'Basic {token}')
        try:
            with urllib.request.urlopen(req) as resp:
                print(f"[+] Komga scan triggered for {komga_id} (HTTP {resp.status})")
        except urllib.error.HTTPError as e:
            print(f"[!] Komga scan failed ({komga_id}): HTTP {e.code} {e.reason}")
        except Exception as e:
            print(f"[!] Komga scan failed ({komga_id}): {e}")

    if __name__ == "__main__":
        if DRY_RUN:
            # Preview normalization only — no extraction, packing, or scans.
            for lib in LIBRARIES:
                if lib["normalize"]:
                    normalize_chapter_filenames(lib["root"])
            print("\nDRY RUN complete — no files changed.")
            sys.exit(0)

        for lib in LIBRARIES:
            root = lib["root"]
            print(f"\n=== Library: {root} ===")
            if not os.path.isdir(root):
                print(f"[-] {root} not found, skipping")
                continue
            extract_zips(root)
            create_cbz_with_skip(root)
            if lib["normalize"]:
                normalize_chapter_filenames(root)
            trigger_komga_scan(lib["komga_id"])
        print("\nProcessing complete!")
