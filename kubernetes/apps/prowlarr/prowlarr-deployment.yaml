apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: default
spec:
  replicas: 1 # restored 2026-06-15 — full cluster back online; reads the SHARED NFS config (dual-cluster shared-NAS setup)
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls144
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - containerPort: 9696 # Default Prowlarr UI port
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config-nfs # shared Synology NFS (was prowlarr-config-pvc on Longhorn)
        - name: data
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc
