 }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n      \"id\": 2,\n      \"title\": \"VRAM Used / Free\",\n      \"type\": \"timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n        \"x\": 6,\n        \"y\": 0\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_FB_USED\",\n          \"legendFormat\": \"GPU {{gpu}} used\",\n          \"refId\": \"A\"\n        },\n        {\n          \"expr\": \"DCGM_FI_DEV_FB_FREE\",\n          \"legendFormat\": \"GPU {{gpu}} free\",\n          \"refId\": \"B\"\n        }\n      ],\n      \"options\": {\n        \"legend\": {\n          \"calcs\": [\n            \"lastNotNull\",\n            \"max\"\n          ],\n          \"displayMode\": \"table\",\n          \"placement\": \"bottom\"\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"mbytes\",\n          \"min\": 0,\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"lineWidth\": 1,\n            \"fillOpacity\": 25,\n            \"showPoints\": \"never\",\n            \"stacking\": {\n              \"mode\": \"normal\",\n              \"group\": \"A\"\n            }\n          }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n      \"id\": 3,\n      \"title\": \"GPU Temperature\",\n      \"type\": \"timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n        \"x\": 12,\n        \"y\": 0\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_GPU_TEMP\",\n          \"legendFormat\": \"GPU {{gpu}}\",\n          \"refId\": \"A\"\n        