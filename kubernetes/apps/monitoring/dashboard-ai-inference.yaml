e\": \"multi\",\n          \"sort\": \"desc\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"watt\",\n          \"min\": 0,\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"lineWidth\": 1,\n            \"fillOpacity\": 10,\n            \"showPoints\": \"never\"\n          }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n      \"id\": 5,\n      \"title\": \"vLLM Requests Running / Waiting\",\n      \"type\": \"timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n        \"x\": 0,\n        \"y\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"vllm:num_requests_running\",\n          \"legendFormat\": \"{{model_name}} running\",\n          \"refId\": \"A\"\n        },\n        {\n          \"expr\": \"vllm:num_requests_waiting\",\n          \"legendFormat\": \"{{model_name}} waiting\",\n          \"refId\": \"B\"\n        }\n      ],\n      \"options\": {\n        \"legend\": {\n          \"calcs\": [\n            \"lastNotNull\",\n            \"max\"\n          ],\n          \"displayMode\": \"table\",\n          \"placement\": \"bottom\"\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"min\": 0,\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"lineWidth\": 1,\n            \"fillOpacity\": 10,\n            \"showPoints\": \"never\"\n          }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n      \"id\": 6,\n      \"title\": \"Time To First Token (p50 / p95)\",\n      \"type\": \"timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n        \"x\": 6