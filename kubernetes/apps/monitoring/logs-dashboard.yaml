apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-logs.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "${datasource}",
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Live Pod Logs",
          "type": "logs"
        },
        {
          "datasource": "${datasource}",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 2,
          "targets": [
            {
              "expr": "sum by (namespace) (count_over_time({namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{namespace}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Log Volume By Namespace",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "loki",
        "kubernetes",
        "logs"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "Loki",
              "value": "Loki"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": "$__all"
            },
            "datasource": "${datasource}",
            "definition": "label_values(namespace)",
            "hide": 0,
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": {
              "label": "namespace",
              "refId": "PrometheusVariableQueryEditor-VariableQuery",
              "stream": "",
              "type": 1
            },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": "$__all"
            },
            "datasource": "${datasource}",
            "definition": "label_values({namespace=~\"$namespace\"}, pod)",
            "hide": 0,
            "includeAll": true,
            "label": "Pod",
            "multi": false,
            "name": "pod",
            "options": [],
            "query": {
              "label": "pod",
              "refId": "PrometheusVariableQueryEditor-VariableQuery",
              "stream": "{namespace=~\"$namespace\"}",
              "type": 1
            },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Kubernetes Logs",
      "uid": "kubernetes-logs",
      "version": 1,
      "weekStart": ""
    }
