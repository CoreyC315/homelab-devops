apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    # Fresh install 2026-07-02 (the previous 61.3.2 install was deleted live
    # during the June consolidation and was never GitOps-managed). Installing
    # current stable directly also satisfies hardening-plan Phase 11 early.
    targetRevision: 87.5.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        # RAM Saving configs for Homelab
        alertmanager:
          alertmanagerSpec:
            replicas: 1
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.local
            pathType: Prefix
          prometheusSpec:
            replicas: 1
            retention: 10d  # Keep data for 10 days
            # Select every ServiceMonitor/PodMonitor/Rule/Probe in the cluster,
            # not just ones carrying the helm release label. Removes the
            # `release: kube-prometheus-stack` label footgun for app monitors
            # (vLLM, LiteLLM, DCGM, KEDA, ...).
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
        grafana:
          replicas: 1
          admin:
            # Created out-of-band (keys: admin-user / admin-password).
            # TODO(SOPS): migrate in hardening-plan Phase 2.
            existingSecret: grafana-admin
          sidecar:
            datasources:
              enabled: true
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.local
            path: /
            pathType: Prefix
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Automatically creates the "monitoring" namespace
      - ServerSideApply=true # Fixes "Too long" error for massive CRDs
