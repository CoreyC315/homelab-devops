apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 61.3.2 # Pinning the version is good practice
    helm:
      releaseName: kube-prometheus-stack
      values: |
        # RAM Saving configs for Homelab
        alertmanager:
          alertmanagerSpec:
            replicas: 1
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.local
            pathType: Prefix
          prometheusSpec:
            replicas: 1
            retention: 10d  # Keep data for 10 days
        grafana:
          replicas: 1
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki:3100
              isDefault: false
          sidecar:
            datasources:
              enabled: true
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.local
            path: /
            pathType: Prefix
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Automatically creates the "monitoring" namespace
      - ServerSideApply=true # Fixes "Too long" error for massive CRDs
