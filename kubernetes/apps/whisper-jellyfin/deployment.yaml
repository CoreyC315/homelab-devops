apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-jellyfin
  namespace: default
  labels:
    app: whisper-jellyfin
spec:
  replicas: 0  # retired for now — subgen handles Whisper subs; OOM'd on long files at medium model
  selector:
    matchLabels:
      app: whisper-jellyfin
  template:
    metadata:
      labels:
        app: whisper-jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      containers:
        - name: whisper
          image: starrider315/whisper-jellyfin:latest
          envFrom:
            - configMapRef:
                name: whisper-jellyfin-config
          env:
            - name: JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: whisper-jellyfin-secret
                  key: JELLYFIN_API_KEY
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc
