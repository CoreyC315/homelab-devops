apiVersion: apps/v1
kind: Deployment
metadata:
  name: subgen
  namespace: default
  labels:
    app: subgen
spec:
  # GPU batch mode: 1 while a backfill batch is running, 0 otherwise. subgen's
  # nvidia.com/gpu claim holds the single GPU even while idle, which blocks
  # KEDA from cold-starting vllm-chat/vllm-coder (they Pend, gateway requests
  # time out). Scale via commit — ArgoCD self-heal reverts kubectl scale.
  replicas: 1
  strategy:
    type: Recreate # single GPU — a rolling update would deadlock on nvidia.com/gpu
  selector:
    matchLabels:
      app: subgen
  template:
    metadata:
      labels:
        app: subgen
        teyvat.io/gpu-workload: "true" # game-mode.sh deletes pods by this label
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: pneuma
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: subgen
          image: mccloud/subgen:latest
          ports:
            - name: webhook
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: subgen-config
          env:
            # Reuse the existing Jellyfin API key (same secret whisper-jellyfin uses).
            - name: JELLYFIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: whisper-jellyfin-secret
                  key: JELLYFIN_API_KEY
          volumeMounts:
            - name: media
              mountPath: /media
            - name: models
              mountPath: /subgen/models
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              # 24Gi, not 8Gi: long files (90-min episodes/movies) spike RAM and
              # OOMKilled the pod at 8Gi — and since the queue is in-memory and
              # deterministic, every restart died at the SAME file (infinite
              # loop). vLLM can't run while subgen holds the GPU, so the node's
              # 48Gi is otherwise idle.
              memory: "24Gi"
              nvidia.com/gpu: 1
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc
        # Node-local NVMe cache for the ~3GB large-v3 CT2 model. pneuma is
        # taint-excluded from Longhorn, so the old Longhorn PVC can't attach
        # here — hostPath is deliberate (vllm /var/lib/vllm-models precedent).
        - name: models
          hostPath:
            path: /var/lib/subgen-models
            type: DirectoryOrCreate
