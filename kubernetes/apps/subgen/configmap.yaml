apiVersion: v1
kind: ConfigMap
metadata:
  name: subgen-config
  namespace: default
data:
  # Run as uid/gid 1000 to match Jellyfin's access to the celestia-nfs share.
  # The default PUID 99 / PGID 100 is denied by the NFS export (can't even
  # scan /media), so the folder monitor and .srt writes both fail without this.
  PUID: "1000"
  PGID: "1000"

  # --- Core behavior: dub-matching subtitles ---
  # "transcribe" = speech-to-text of the actual spoken audio (the English dub),
  # so subs follow the dub word-for-word. (NOT "translate", which would render
  # the Japanese audio into English and reproduce the subs/dubtitles mismatch.)
  TRANSCRIBE_OR_TRANSLATE: "transcribe"
  # When a file has multiple audio tracks, prefer the English (dub) track.
  PREFERRED_AUDIO_LANGUAGES: "eng"

  # GPU backfill on pneuma (RTX 5070 Ti): large-v3 in CUDA is ~50x realtime,
  # so the whole-show-library pass that OOM-looped on CPU is now feasible.
  WHISPER_MODEL: "large-v3"
  TRANSCRIBE_DEVICE: "cuda"

  # --- Whole-show-library backfill (GPU) ---
  # LIMIT_TO_PREFERRED_AUDIO_LANGUAGE=True below means only files with an
  # English (dub) audio track get transcribed, so pointing at the whole show
  # tree = "every show that has an English dub". The queue is in-memory, but
  # restarts resume where they left off: the skip pair below recognizes each
  # already-written "<video>.English (Dub).srt" and requeues only the rest.
  # Avatar (2026) movie was prepended here for a priority one-off (done
  # 2026-07-05, srt written) then removed so restarts don't redo it. Prepend a
  # folder to jump the queue; it only applies on the next pod (re)start.
  TRANSCRIBE_FOLDERS: "/media/media/show"
  # Keep watching the media folders so new Sonarr/Radarr imports get queued
  # immediately — subs are ready well before you sit down to watch.
  MONITOR: "True"
  # These two flags only work as a PAIR (verified against the code in the
  # deployed image, 2026-07-13). The shows we care about already have an
  # embedded English sub track (mismatched dubtitles), and TARGET alone
  # counts those and would skip the whole library. SUBGEN narrows every
  # existing-subtitle check to subgen's own output, which reduces TARGET to
  # one exact-filename test: skip iff "<video>.English (Dub).srt" exists.
  # ("English (Dub)" isn't a parseable language name, so all of subgen's
  # language-based skip checks are no-ops — the exact-name test is the only
  # one that can fire.) Net effect: restarts skip finished episodes instead
  # of re-transcribing ~700 of them.
  SKIP_IF_TARGET_SUBTITLES_EXIST: "True"
  SKIP_ONLY_SUBGEN_SUBTITLES: "True"
  # Only transcribe files that actually have an English (dub) audio track.
  # Prevents wasting CPU transcribing sub-only shows' Japanese audio into
  # useless Japanese subs.
  LIMIT_TO_PREFERRED_AUDIO_LANGUAGE: "True"
  # 2 on GPU: overlap one file's NFS/ffmpeg audio extraction with another's
  # transcription so the GPU doesn't idle between episodes. Two large-v3
  # instances (~2GB VRAM each) fit comfortably in 16GB.
  CONCURRENT_TRANSCRIPTIONS: "2"
  WHISPER_THREADS: "4"

  # Persist the downloaded model so it survives pod restarts.
  MODEL_PATH: "/subgen/models"

  # Make the track unmistakable in Jellyfin's subtitle picker. subgen has only
  # one editable label token (no separate title field), so we overload it to
  # read "English (Dub)" and strip the noisy ".subgen.medium" tokens. Jellyfin
  # may show the language column as Undetermined, but the label is obvious — and
  # this track is meant to be picked manually over the bad embedded English sub.
  SUBTITLE_LANGUAGE_NAME: "English (Dub)"
  SHOW_IN_SUBNAME_SUBGEN: "False"
  SHOW_IN_SUBNAME_MODEL: "False"

  # Used to refresh/notify Jellyfin after a sub is written.
  JELLYFIN_SERVER: "http://jellyfin-service.default.svc.cluster.local:80"
  WEBHOOK_PORT: "9000"
