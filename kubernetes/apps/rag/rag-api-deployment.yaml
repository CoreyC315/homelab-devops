apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: ai-stack
  labels:
    app: rag-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            # pip-at-runtime (pinned) — see rag-ingest for rationale.
            - >-
              pip install --quiet --no-cache-dir
              fastapi==0.115.14 uvicorn==0.34.3 requests==2.32.4 &&
              uvicorn app:app --host 0.0.0.0 --port 8000 --app-dir /scripts
          env:
            - name: QDRANT_URL
              value: http://qdrant.ai-stack.svc.cluster.local:6333
            - name: LITELLM_URL
              value: http://litellm.ai-stack.svc.cluster.local
            - name: LITELLM_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 5
            failureThreshold: 24 # pip install at boot ~30-60s
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: rag-api-script
