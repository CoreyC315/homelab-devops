apiVersion: batch/v1
kind: CronJob
metadata:
  name: rag-ingest
  namespace: ai-stack
spec:
  schedule: "30 4 * * *"
  timeZone: America/Chicago
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: rag-ingest
        spec:
          restartPolicy: Never
          initContainers:
            - name: clone
              image: alpine/git:v2.47.2
              args:
                - clone
                - --depth=1
                - https://github.com/CoreyC315/homelab-devops.git
                - /work/repo
              volumeMounts:
                - name: work
                  mountPath: /work
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          containers:
            - name: ingest
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                # pip-at-runtime (pinned) — avoids maintaining a custom image
                # from an arm64 Mac. Single dep on purpose (REST everywhere).
                - pip install --quiet --no-cache-dir requests==2.32.4 && python /scripts/ingest.py
              env:
                - name: QDRANT_URL
                  value: http://qdrant.ai-stack.svc.cluster.local:6333
                - name: LITELLM_URL
                  value: http://litellm.ai-stack.svc.cluster.local
                - name: LITELLM_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-secret
                      key: LITELLM_MASTER_KEY
              volumeMounts:
                - name: work
                  mountPath: /work
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: work
              emptyDir: {}
            - name: scripts
              configMap:
                name: rag-ingest-script
