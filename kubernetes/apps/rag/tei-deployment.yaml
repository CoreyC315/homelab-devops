apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei
  namespace: ai-stack
  labels:
    app: tei
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tei
  template:
    metadata:
      labels:
        app: tei
    spec:
      # CPU embeddings on the regular workers — embedding requests must NOT
      # wake the GPU node.
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          args:
            - --model-id
            - BAAI/bge-small-en-v1.5 # dim 384, ~130MB download at startup
            - --port
            - "3000"
          env:
            - name: HUGGINGFACE_HUB_CACHE
              value: /data
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            failureThreshold: 30 # model download on first start
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
