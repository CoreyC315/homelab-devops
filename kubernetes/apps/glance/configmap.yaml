apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    theme:
      background-color: "225 50 8"
      primary-color: "195 90 60"
      positive-color: "160 70 45"
      negative-color: "5 85 55"
      contrast-multiplier: 1.2
      text-saturation-multiplier: 0.85

    branding:
      app-name: "Teyvat Control"
      logo-text: "TC"
      hide-footer: true
      app-background-color: "#050b14"

    pages:
      - name: Home
        width: wide
        show-mobile-header: true
        head-widgets:
          - type: search
            search-engine: duckduckgo
            new-tab: true
            placeholder: "Search... (!gh GitHub  !repo Homelab  !r Reddit)"
            bangs:
              - title: GitHub
                shortcut: "!gh"
                url: https://github.com/search?q={QUERY}
              - title: Repo
                shortcut: "!repo"
                url: https://github.com/CoreyC315/homelab-devops/search?q={QUERY}
              - title: Reddit
                shortcut: "!r"
                url: https://www.reddit.com/search?q={QUERY}
              - title: Docker Hub
                shortcut: "!dh"
                url: https://hub.docker.com/search?q={QUERY}

        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: "12h"
                timezones:
                  - timezone: America/Los_Angeles
                    label: Pacific
                  - timezone: America/Chicago
                    label: Central
                  - timezone: America/New_York
                    label: Eastern
              - type: calendar
                first-day-of-week: sunday
              - type: weather
                location: "Chicago, Illinois, United States"
                units: imperial
                hour-format: "12h"
                show-area-name: true

          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: "Platform"
                    color: "211 70 55"
                    links:
                      - title: ArgoCD
                        url: https://argo.local
                        description: GitOps control plane
                        icon: si:argo
                      - title: Longhorn
                        url: http://longhorn.local
                        description: Storage & volume management
                        icon: mdi:database
                      - title: Grafana
                        url: http://grafana.local
                        description: Dashboards & alerting
                        icon: si:grafana
                      - title: Prometheus
                        url: http://prometheus.local
                        description: Metrics & monitoring
                        icon: si:prometheus
                      - title: GitHub
                        url: https://github.com/CoreyC315/homelab-devops
                        description: GitOps source of truth
                        icon: si:github

                  - title: "Media"
                    color: "154 48 44"
                    links:
                      - title: Jellyfin
                        url: http://jellyfin.local
                        description: Media server
                        icon: si:jellyfin
                      - title: Jellyseerr
                        url: http://seerr.local
                        description: Requests & approvals
                        icon: mdi:movie-open-check
                      - title: Radarr
                        url: http://radarr.local
                        description: Movie automation
                        icon: si:radarr
                      - title: Sonarr
                        url: http://sonarr.local
                        description: TV automation
                        icon: si:sonarr
                      - title: Prowlarr
                        url: http://prowlarr.local
                        description: Indexer manager
                        icon: mdi:radar
                      - title: qBittorrent
                        url: http://qbit.local
                        description: Downloader + ProtonVPN
                        icon: si:qbittorrent

                  - title: "Manga"
                    color: "270 60 55"
                    links:
                      - title: Komga
                        url: http://komga.local
                        description: Manga & comic library
                        icon: mdi:book-open-page-variant
                      - title: Suwayomi
                        url: http://suwayomi.local
                        description: Manga reader & downloader
                        icon: mdi:book-open-variant
                      - title: Manga-Watch
                        url: http://manga-watch.local
                        description: Auto-download automation
                        icon: mdi:eye-check

              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true
                limit: 5
                collapse-after: 3

          - size: small
            widgets:
              - type: monitor
                cache: 1m
                title: Service Health
                style: compact
                sites:
                  - title: ArgoCD
                    url: https://argo.local
                    check-url: https://argocd-server.argocd.svc.cluster.local
                    allow-insecure: true
                    icon: si:argo
                  - title: Longhorn
                    url: http://longhorn.local
                    check-url: http://longhorn-frontend.longhorn-system.svc.cluster.local
                    icon: mdi:database
                  - title: Grafana
                    url: http://grafana.local
                    check-url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local
                    icon: si:grafana
                  - title: Prometheus
                    url: http://prometheus.local
                    check-url: http://prometheus-operated.monitoring.svc.cluster.local:9090
                    icon: si:prometheus
                  - title: Jellyfin
                    url: http://jellyfin.local
                    check-url: http://jellyfin-service.default.svc.cluster.local
                    icon: si:jellyfin
                  - title: Jellyseerr
                    url: http://seerr.local
                    check-url: http://seerr.default.svc.cluster.local:5055
                    icon: mdi:movie-open-check
                  - title: Radarr
                    url: http://radarr.local
                    check-url: http://radarr.default.svc.cluster.local:7878
                    icon: si:radarr
                  - title: Sonarr
                    url: http://sonarr.local
                    check-url: http://sonarr.default.svc.cluster.local:8989
                    icon: si:sonarr
                  - title: Prowlarr
                    url: http://prowlarr.local
                    check-url: http://prowlarr.default.svc.cluster.local:9696
                    icon: mdi:radar
                  - title: qBittorrent
                    url: http://qbit.local
                    check-url: http://qbittorrent.default.svc.cluster.local:8080
                    icon: si:qbittorrent
                  - title: Komga
                    url: http://komga.local
                    check-url: http://komga.default.svc.cluster.local:25600
                    icon: mdi:book-open-page-variant
                  - title: Suwayomi
                    url: http://suwayomi.local
                    check-url: http://suwayomi.default.svc.cluster.local:4567
                    icon: mdi:book-open-variant
                  - title: Manga-Watch
                    url: http://manga-watch.local
                    check-url: http://manga-watch.default.svc.cluster.local:8080
                    icon: mdi:eye-check

              - type: releases
                title: Latest Releases
                cache: 12h
                repositories:
                  - k0sproject/k0s
                  - argoproj/argo-cd
                  - longhorn/longhorn
                  - jellyfin/jellyfin
                  - glanceapp/glance
                  - gotson/komga
                  - qmcgaw/gluetun

      - name: Updates
        width: slim
        columns:
          - size: full
            widgets:
              - type: hacker-news
                limit: 15
                collapse-after: 5

              - type: releases
                title: Release Tracker
                cache: 12h
                repositories:
                  - k0sproject/k0s
                  - argoproj/argo-cd
                  - longhorn/longhorn
                  - metallb/metallb
                  - cert-manager/cert-manager
                  - jellyfin/jellyfin
                  - glanceapp/glance
                  - gotson/komga
                  - suwayomi/suwayomi-server
                  - qmcgaw/gluetun
                  - linuxserver/docker-radarr
                  - linuxserver/docker-sonarr
