apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: glance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      containers:
        - name: glance
          image: glanceapp/glance@sha256:92989752b372b58d49a98b9f7c70004bda9b8fb661f84cdb05abaae5ba450763
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config
              #subPath: glance.yml
      volumes:
        - name: config
          configMap:
            name: glance-config
