apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: glance
spec:
  replicas: 0  # scaled to 0 2026-06-13 — single-node consolidation, only jellyfin+seerr kept
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      containers:
        - name: glance
          image: glanceapp/glance:v0.8.4
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config
              #subPath: glance.yml
      volumes:
        - name: config
          configMap:
            name: glance-config
