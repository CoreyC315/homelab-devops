apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Pinned to aether-worker to keep the user-facing media server off
      # nahida-worker, where subgen's Whisper transcription pegs the CPU.
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      securityContext:
        fsGroup: 1000
        # render (110) + video (44) gids on aether-worker, needed to open
        # /dev/dri/renderD128 for VAAPI hardware transcoding on the Vega iGPU.
        supplementalGroups: [110, 44]
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          securityContext:
            # Required so the container's device cgroup permits opening
            # /dev/dri/renderD128 (the VAAPI render node). Without this, the
            # hostPath device is visible but open() returns EPERM. File access
            # is still scoped by the render/video supplementalGroups above.
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Detroit"
          volumeMounts:
            - name: config
              mountPath: /config # UNCOMMENTED: Saves your "Akasha" data
            - name: media
              mountPath: /media
            - name: dri
              mountPath: /dev/dri # AMD Vega iGPU passed through from aether host
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: akasha-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc # Points to the shared Irminsul storage
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
