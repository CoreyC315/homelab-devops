apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Pinned to aether-worker to keep the user-facing media server off
      # nahida-worker, where subgen's Whisper transcription pegs the CPU.
      nodeSelector:
        kubernetes.io/hostname: "aether-worker"
      securityContext:
        fsGroup: 1000
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Detroit"
          volumeMounts:
            - name: config
              mountPath: /config # UNCOMMENTED: Saves your "Akasha" data
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: akasha-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: irminsul-records-celestia-pvc # Points to the shared Irminsul storage
