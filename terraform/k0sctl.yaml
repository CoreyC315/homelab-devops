# If you are getting blocked by ssh certifications or not having the host
# run these
# 1. mv ~/.ssh/known_hosts ~/.ssh/known_hosts.tmp
# 2. Then run the command to start it k0sctl apply --config k0sctl.yaml
# 3. mv ~/.ssh/known_hosts.tmp ~/.ssh/known_hosts
# MAKE SURE TO RENAME IT BACK or else you won't be able to remote into anything

apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: homelab-cluster
spec:
  hosts:
    # --- Controller Node (single, on Aether) ---
    - role: controller
      ssh:
        address: 192.168.1.201
        user: ubuntu
        keyPath: ~/.ssh/id_rsa

    # --- Standard Worker Nodes ---
    #--- raiden-worker RETIRED 2026-07 (host decommissioned; node removed) ---
    #- role: worker
    #  ssh:
    #    address: 192.168.1.211
    #    user: ubuntu
    #    keyPath: ~/.ssh/id_rsa
    - role: worker
      ssh:
        address: 192.168.1.212
        user: ubuntu
        keyPath: ~/.ssh/id_rsa
    - role: worker
      ssh:
        address: 192.168.1.213
        user: ubuntu
        keyPath: ~/.ssh/id_rsa

    #--- pneuma (GPU worker, RECORD ONLY — do NOT uncomment) ---
    # Arch VM 100 "omarchy" on furina (standalone PVE host, 192.168.1.103).
    # Joined manually 2026-07-02 via `k0s token create --role=worker` +
    # `k0s install worker --labels teyvat.io/gpu=true
    #  --taints nvidia.com/gpu=present:NoSchedule` (raiden-rebuild precedent:
    # never point k0sctl at a live cluster / this non-Ubuntu pet node).
    # See Documentation/pneuma/phase-0-node.md.
    #- role: worker
    #  ssh:
    #    address: 192.168.1.214
    #    user: starrider315

    #--- The Raspberry Pi Worker ---
    #- role: worker
    #  ssh:
    #    address: 192.168.1.102
    #    user: pi

  # FIXED: k0s is now a direct child of spec
  k0s:
    version: 1.35.2+k0s.0

  options:
    wait:
      enabled: true
